# =====================================================
# MAZE BANK — LIGHT THEME (Soft Green Palette)
# =====================================================

# --- Color Variables ---
@green0        = #F0F7F1
@green1        = #D9EFD9
@green2        = #BDE0BF
@greenBorder   = #9DCCA1
@greenText     = #1A3320
@greenSubText  = #4A7A52
@accent        = #2E7D46
@accentHover   = #1F5E33
@accentSoft    = #7DBF89
@success       = #2E7D46
@danger        = #B94040
@dangerHover   = #8E2A2A

# --- Window & Panels ---
Panel.background                        = @green0
RootPane.background                     = @green0
SplitPane.background                    = @green0
TabbedPane.background                   = @green0
TabbedPane.contentAreaColor             = @green0
ScrollPane.background                   = @green0
Viewport.background                     = @green0

# --- Controls & Inputs ---
TextField.background                    = #FFFFFF
TextField.foreground                    = @greenText
TextField.caretForeground               = @accent
TextField.border                        = 1,1,1,1,@greenBorder
TextArea.background                     = #FFFFFF
TextArea.foreground                     = @greenText
PasswordField.background                = #FFFFFF
PasswordField.foreground                = @greenText
ComboBox.background                     = #FFFFFF
ComboBox.foreground                     = @greenText
ComboBox.selectionBackground            = @green2
ComboBox.selectionForeground            = @greenText

# --- Buttons ---
Button.background                       = @green1
Button.foreground                       = @greenText
Button.hoverBackground                  = @green2
Button.pressedBackground                = @greenBorder
Button.arc                              = 8
Button.focusedBorderColor               = @accent

# --- Labels ---
Label.foreground                        = @greenText

# --- Table ---
Table.background                        = #FFFFFF
Table.foreground                        = @greenText
Table.alternateRowColor                 = @green0
Table.selectionBackground               = @green2
Table.selectionForeground               = @greenText
Table.gridColor                         = @greenBorder
TableHeader.background                  = @green1
TableHeader.foreground                  = @accent

# --- Scrollbars ---
ScrollBar.thumb                         = @green2
ScrollBar.thumbHoverColor               = @greenBorder
ScrollBar.track                         = @green0

# --- TabbedPane ---
TabbedPane.selectedBackground           = @green0
TabbedPane.foreground                   = @greenSubText
TabbedPane.selectedForeground           = @accent
TabbedPane.underlineColor               = @accent
TabbedPane.contentSeparatorColor        = @greenBorder

# --- Progress & Spinner ---
ProgressBar.foreground                  = @accent

# --- Separator ---
Separator.foreground                    = @greenBorder

# --- Menubar ---
MenuBar.background                      = @green1
MenuBar.foreground                      = @greenText
MenuItem.selectionBackground            = @green2
MenuItem.selectionForeground            = @greenText

# --- Option Pane ---
OptionPane.background                   = @green0
OptionPane.messageForeground            = @greenText
