# =====================================================
# MAZE BANK — DARK THEME (Navy / Dark Blue Palette)
# =====================================================

# --- Color Variables ---
@navy0         = #0D1B2A
@navy1         = #132438
@navy2         = #1B3050
@navyCard      = #162035
@navyBorder    = #253D5B
@navyText      = #D6E8FF
@navySubText   = #8BA8C8
@accent        = #4B9FE1
@accentHover   = #6DB8F5
@accentSoft    = #1E5C8E
@success       = #3DA876
@danger        = #E05C5C
@dangerHover   = #C73D3D

# --- Window & Panels ---
Panel.background                        = @navy0
RootPane.background                     = @navy0
SplitPane.background                    = @navy0
TabbedPane.background                   = @navy0
TabbedPane.contentAreaColor             = @navy0
ScrollPane.background                   = @navy0
Viewport.background                     = @navy0

# --- Controls & Inputs ---
TextField.background                    = @navy1
TextField.foreground                    = @navyText
TextField.caretForeground               = @accent
TextField.border                        = 1,1,1,1,@navyBorder
TextArea.background                     = @navy1
TextArea.foreground                     = @navyText
PasswordField.background                = @navy1
PasswordField.foreground                = @navyText
ComboBox.background                     = @navy1
ComboBox.foreground                     = @navyText
ComboBox.selectionBackground            = @navy2
ComboBox.selectionForeground            = @navyText

# --- Buttons ---
Button.background                       = @navy1
Button.foreground                       = @navyText
Button.hoverBackground                  = @navy2
Button.pressedBackground                = @navyBorder
Button.arc                              = 8
Button.focusedBorderColor               = @accent

# --- Labels ---
Label.foreground                        = @navyText

# --- Table ---
Table.background                        = @navy1
Table.foreground                        = @navyText
Table.alternateRowColor                 = @navy0
Table.selectionBackground               = @navy2
Table.selectionForeground               = @navyText
Table.gridColor                         = @navyBorder
TableHeader.background                  = @navy2
TableHeader.foreground                  = @accent

# --- Scrollbars ---
ScrollBar.thumb                         = @navy2
ScrollBar.thumbHoverColor               = @navyBorder
ScrollBar.track                         = @navy0

# --- TabbedPane ---
TabbedPane.selectedBackground           = @navy0
TabbedPane.foreground                   = @navySubText
TabbedPane.selectedForeground           = @accent
TabbedPane.underlineColor               = @accent
TabbedPane.contentSeparatorColor        = @navyBorder

# --- Progress & Spinner ---
ProgressBar.foreground                  = @accent

# --- Separator ---
Separator.foreground                    = @navyBorder

# --- Menubar ---
MenuBar.background                      = @navy1
MenuBar.foreground                      = @navyText
MenuItem.selectionBackground            = @navy2
MenuItem.selectionForeground            = @navyText

# --- Option Pane ---
OptionPane.background                   = @navy0
OptionPane.messageForeground            = @navyText
